services:
  postgres:
    image: postgres:18-alpine
    container_name: padel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: padel
    ports:
      - "5544:5432"
    volumes:
      - padel-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d padel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  padel-pgdata:
