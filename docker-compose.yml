services:
  postgres:
    image: postgres:18-alpine
    container_name: padel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: padel
    ports:
      - "5544:5432"
    volumes:
      # Postgres 18+ images store data in version-specific subdirectories and
      # expect the volume mounted at /var/lib/postgresql (not .../data).
      - padel-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d padel"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Observability stack. Behind the `observability` profile so the default
  # `docker compose up` (and `bun run db:up`) only starts Postgres. Start it
  # with `bun run obs:up` (or `docker compose --profile observability up -d`).
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: padel-prometheus
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - padel-prometheus-data:/prometheus
    ports:
      - "9090:9090"
    # Lets the container reach the app's /api/metrics on the host (works on
    # Docker Desktop automatically; the mapping is required on Linux).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: padel-grafana
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - padel-grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  # Postgres metrics for Prometheus.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    container_name: padel-postgres-exporter
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/padel?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres

  # Log aggregation: Loki stores logs, Alloy ships container logs to it.
  loki:
    image: grafana/loki:3.3.0
    container_name: padel-loki
    profiles: ["observability"]
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - padel-loki-data:/loki
    ports:
      - "3100:3100"

  alloy:
    image: grafana/alloy:v1.5.1
    container_name: padel-alloy
    profiles: ["observability"]
    restart: unless-stopped
    # Root so Alloy can read the Docker socket to discover/tail container logs.
    user: root
    command:
      - "run"
      - "/etc/alloy/config.alloy"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - padel-alloy-data:/var/lib/alloy/data
    ports:
      - "12345:12345"
    depends_on:
      - loki

volumes:
  padel-pgdata:
  padel-prometheus-data:
  padel-grafana-data:
  padel-loki-data:
  padel-alloy-data:
