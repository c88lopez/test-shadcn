name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint, format & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run check

      - name: Test (with coverage)
        run: bun run test:coverage

      - name: Coverage summary
        if: ${{ !cancelled() }}
        run: |
          f=coverage/coverage-summary.json
          if [ -f "$f" ]; then
            {
              echo "### Unit coverage (src/lib)"
              echo ""
              echo "| Metric | % | Covered / Total |"
              echo "| --- | --- | --- |"
              for m in statements branches functions lines; do
                pct=$(jq -r ".total.$m.pct" "$f")
                cov=$(jq -r ".total.$m.covered" "$f")
                tot=$(jq -r ".total.$m.total" "$f")
                echo "| $m | ${pct}% | ${cov} / ${tot} |"
              done
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Log test database URL
        run: echo "DATABASE_URL_TEST=$DATABASE_URL_TEST"

      - name: Run integration tests
        run: bun run test:integration

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
      BETTER_AUTH_SECRET: e2e-secret-not-for-production
      BETTER_AUTH_URL: http://localhost:3100
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Playwright's test runner is most reliable under Node; the app server it
      # launches is the production build (`bun run build` + Nitro node output).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply database migrations
        run: bun run db:migrate

      - name: Seed demo data
        run: bun run db:seed:demo

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to Vercel (production)
    needs: [quality, build, integration, e2e]
    # Only deploy production from main pushes, and only once Vercel is wired up
    # (set the repo variable ENABLE_VERCEL_DEPLOY=true and the three secrets).
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.ENABLE_VERCEL_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Vercel CLI
        run: bun add -g vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Build with Nitro's Vercel preset so the output is Vercel's Build Output
      # API format (.vercel/output). `vercel build` can't be used here because
      # it doesn't set the system env Nitro needs to auto-detect Vercel.
      - name: Build (Vercel output)
        run: bun run build
        env:
          NITRO_PRESET: vercel

      # Apply pending DB migrations against production before shipping new code.
      # Auto-baselines a database that was originally created with `db:push`.
      - name: Run database migrations
        run: bun run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy prebuilt output to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
